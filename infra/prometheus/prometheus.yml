global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - /etc/prometheus/alert.rules.yml

# Send alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # Your sample app
  - job_name: "sample-app"
    static_configs:
      - targets: ["sample-app:3000"]

  # Container metrics (CPU, memory per container)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Host machine metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]